body:
  text: 嗣法門人達最等編小參舉今舉古沉埋佛祖談心談性錯過自家到者裏道有不得道無不得道非有不得道非無不得道非非有不得道非非無不得畢竟如何良久云不得不得閲藏小參者箇事如千日並照秖是無你下手處無你證入處於無證入處別立一機猶隔大千在明晨開演海藏欽祝聖域今日事不獲已與諸禪德預通消息要知此經不在文句上不在視聽上不在寂默上不在博采上即雷動風行豈不是經鴉鳴鵲噪豈不是經日往月來豈不是經雖然如是諸人若作此會一棒打折你驢腰莫言不道小參了上座昨夜入草求人並無些子影響而今一網俱收有解𨁝跳底試出來看問多年功行今已圓度驢度馬滿前川且道驢馬作麼生度師云寶劍逼人寒僧拂袖退師便打乃云月月有十四月月有三十大家共聚首且道承誰力良久云舉頭天外看誰是我般人小參心不是佛智不是道山青水緑星明月皎有時把住釋迦無潛身之路彌勒無退後之門有時放行德山棒如雨點臨濟喝似雷奔道無爭奈萬物樅然道有一毫動著不得且不落有無一句作麼生道時西堂才出師便歸方丈小參説禪説道望空啓告説佛説心喚假作真南明不入者保社豈肯誤認生平設有箇英靈底聞恁麼道把山僧拽出三門外爛捶一頓我道汝也不枉到南明小參趙州茶雲門餅楊岐驢子威猛曹山木蛇惺惺召衆云且道與南明案山子相去多少衆無對師喝一喝云切忌瞌睡除歲小參古人烹露地白牛分歲蘭溪者裏無歲可分亦無白牛可烹秪是燒松蓬剔慧燈門前爆竹兩三聲驀召大衆云且道與古人是同是別良久云知音不必頻頻舉達者從教暗裏驚小參者箇事直饒通身是口也無他説處通身是眼也無他視處通身是耳也無他聽處通身是鼻也無他嗅處通身是手也無他指處通身是腳也無他行處不見僧問趙州萬法歸一一歸何處州云我在青州做一領布衫重七斤山僧又不然設有箇出來問萬法歸一一歸何處秖向他道且忌口著諸人若在者裏討得下落來方丈通箇消息廣録節度使范專書問云不佞切於宗乘無由一睹請和尚方便師以偈答云息心甘自陷著有還差互兩道眉高著一條脊直豎正如井覷驢莫將心戀悟欲見本來人緊恰好照顧范感悟因讀破山師翁語録至一點明星刺眼開輝天鑑地歎奇哉當時想是無禪客若有和聲打落腮於此致疑録出請決於師復答偈云點鐵成金在霎時聖凡不二此何疑此疑一涉程千里秖許親親獨自知遂深契之專李公謝云撫臺覽偈大悅言欲修行不能斷辛師云修行不在斷辛公曰撫臺萬民所賴修行不得師云撫臺得卻是居士不得公遂禮拜求開示師云欲了生死參悟為最不知生之來處死之去處豈可不疑不疑則不悟不悟則如地無種何處有收更或隨波逐浪馬腹驢胎阿誰免得所以古人教人參萬法歸一一歸何處疑來疑去忽然疑團打破生也是者箇死也是者箇如珠走盤如盤走珠豈不快哉公作禮而去茶話大盡三十日小盡二十九大衆普喫茶切忌打溼口若也打溼口拄杖劈脊摟雲衲叢叢聚頭箇箇毛生板齒吞跳栗棘金剛全然不挂些子雖然如是也要向薦取楊岐栗棘蓬豎拂云靜隱龜毛拂縱有解吞吐也須白汗出良久云還有恁麼人麼時維那吹滅燭師云緊妨噎殺光明赫奕無少無欠覷著則兩眼俱瞎咬著則咽喉齊斷設有箇不挂唇齒底也秖救取一半今日值端午大衆休別睹若別睹靜隱山中出艾虎入室機緣首座入師云者裏還有賓主麼座喝云是賓是主師打座拂袖歸衆師云了西堂入師云兩堂下喝畢竟誰是堂云二俱不是師連打兩棒堂云如是如是師直打出僧入師以拄杖左邊指云且向者邊著僧便行師云你又恁麼去那僧喝師直打出勘驗機緣楚雲參師云甚處來云澄江師云止和尚有甚言句云有甚言句師云恁麼汝不從那邊來云和尚猶是者邊漢師微笑僧參師云把斷咽喉作麼生道云某甲不道師直打出問僧甚處來云雞足師云迦葉與你道甚麼僧茫然師云空走一回問僧南泉斬貓汝作麼會云血流三千里師連棒打出醉舌參師云未跨門時三十棒汝作麼領略舌便喝師云維摩一默又作麼生舌拂臥具便出師云未在一日召云吾有一事汝作麼承當舌喝師云汝再道看云道破則不堪拂袖便出師可之問僧那裏來曰六詔師云甚處住曰無住處師云亂走作麼僧無語師顧侍者云將茶與伊溼口善權辭師豎拄杖云不可喚作拄杖汝作麼生權便喝師云鐵蛇橫古路作麼生過權拂袖出師把住云道得即去權云教某甲道甚麼師噓一聲雪基齎靜明老人書至師捧起問云者是老人字麼曰是師云在甚處著畫曰在者裏師云放子三十棒曰過在甚處師云向下文長僧參師云有言非究竟無言究竟非速道僧茫然師云終非究竟師召僧僧至師連棒打云逐色隨聲漢不打更待何時極乘參師云如何是佛法大意乘喝師云心佛俱非你作麼生曰一任縱橫師云玄沙道底曰者裏的是徹頭處師直打出顯今參師云汝從南華來有甚言句曰正要和尚疑著師云疑箇甚麼顯便喝師云莫是者一喝麼曰被和尚勘破師微笑師詣造衣處拈起一塊問顯今者箇從前千頭萬緒因甚得成片去曰不識師云為甚不識曰一任卜度師隨聲掌云卜度箇甚麼顯遽答曰不勞注腳師直打出問答機緣僧問和尚教參活句如何即是師便打僧擬議師云為甚又逐死句三目禪師乞牧牛頌師云須用自家底始得曰也要看過師云用看作麼目擬舉拂子師云早已勘破了目作色師笑而出禹門老人專使送法衣至師拈香禮拜云老大箇漢時節也不識僧云此是好事師云好事不如無士問萬法歸一一歸何處師云合取狗口士罔措時聞板聲師云喫粥去士問古聖運神通未審神通作麼生運師云幸得居士到者裏士問天龍豎指和尚豎拳是同是別師云春蘭秋菊僧問承和尚示南泉斬貓意旨某鈍滯連日師掌云者野狐精僧與師一推云瞞不得瞞不得便出尚書扶檀越入山云求為弟子得麼師云不得曰如何即得師云無你承當處僧問如何是和尚心要師云無孔鐵鎚當面擲曰如何得入師云看腳下曰如何是向上事師云眨上眉毛早已蹉過曰如何是作止任滅師云截曰如何是閉門打睡接上上機師云奈汝在門外何官人問語言文字猶落言詮望和尚指示師云指示更落言詮官禮拜師云好與三十棒惺庵問蒙開示後至今兩頭不著師云你向甚處安身立命庵罔測師喝出士問千載奇逢求和尚一言半句師云坐卻舌頭督捕戴公入山問弟子於世間經史靡不精通師驀豎拂子云通得者箇麼公罔測師云將謂將謂金騰道張公入山問云弟子進堂同住得麼師云看居士作麼進曰假如進了和尚又作麼生師云也不放過僧問十二時中如何降伏其心師云汝將心來僧無對師云恁麼即降伏也師偶閉戶一衆驚疑太府李公請出師云我者裏上至三十三天下至無量無邊世界和我八萬四千毛孔總是箇關你道在甚處出入西堂云看腳下師便開達鑑居士冒雨入山作禮師云殃及居士拖泥帶水曰不曾溼師云又拖了一身也問僧人人本有為甚茫然不曉曰咬著踏著師以拂子云者箇還踏著也未僧繞一匝師云失俗士問云弟子久慕高明奈紅塵擺不脫師云為甚到者裏士無語師云果然擺不脫僧問如何是袈裟下事師以杖指云且向者裏著時九有錢文學不出衆云不隨和尚腳跟轉師云瞎曰盡大地是一隻眼師云瞎瞎朗玄問某特來求和尚分付師云分付則頭上安頭曰不得春風花不開花開須借春風力師云此時冬景何得言春朗無對師赴齋回居士送云弟子送和尚到者裏和尚送弟子歸何處師云禮拜著士便拜師云在何處士罔測師便打僧問生死向何處了師云燈光明似日士問不是心不是佛不是物是箇甚麼師隨便喝士作禮云謝和尚慈悲師云你道是箇甚麼士云穿衣喫飯師云不是不是法語示雪基禪人雪基上人懷古德之志味善財之風不惜形骸雲瓢雪笠涉水登山遍參天童雪門黃檗及我昭覺老人經今不自歇心與余共居一味乾爆爆地直教全身放下勿助勿忘水到自然渠成設使東秦西楚朝南暮北與道遠也思之示皎月禪人衲僧家須發勇為心立決定志如百戰場中拒敵倘稍有失計縱聖力匡扶亦不勝任今山野不惜眉毛絡索語汝須捨逸趨勞立下死心做去毋論徹與不徹著著向釋迦眉睫上斫斧彌勒開顏處揮斤若無者番手眼依舊黑漫漫地示月浪禪人欲脫生死必將父母未生前事提挈到佛不能親祖不能近了沒巴鼻處則知參學事業猶是錦上堆花傳佛心印亦是好肉剜瘡汝若到此田地始信恁麼説話其或未然當以勇鋭志單刀直入示孤燈禪人孤燈禪人從江右至蜀欲了本分萬里參尋知識殊不知本地風光秖在穿衣喫飯時運水搬柴處何嘗昧卻但古人弄巧成拙把箇鐵饅首教末代兒孫晝參夜參參到計窮力極始有相應地山野大不然衆生本不迷諸佛何嘗悟若道悟是謗如來倘言迷又欺自己須知古德三登九上是自起自倒示祖鼻首座教外別傳之旨未嘗有一法與人亦未嘗令人承領如壁立萬仞似白日青天所以臨濟佛來也喝祖來也喝德山佛來也打祖來也打汝向後若把茆蓋頂直須總不恁麼去且道如何即是咄示一則禪人此事如登極頂亦似太陽初升愈行愈不盡愈出愈光明少涉思惟自取喪身之兆了上座恁麼説如向虛空裏挖孔深淵中摸月若有佛法商量不惟埋沒先聖何故三十年後示楚雲首座禪和踏遍天涯參遍諸方向孤峰絶頂上三二十年飽風飽雨要與佛祖作隊硬赳赳地孤迥迥地一任龍天推出猶然不顧始有出群超格分示具眼禪人做禪和子務要手腳貼實將前所見所聞一併拋向無陰陽地上於行住坐臥時諄諄切切不要放過一任逆順境界都盧不管如斯體理卓卓有出身路始有參學分示遍容長老遍容長老與吾師翁契久今日覓吾幾字也是無醜圖醜我欲讚公公無何有我若罵公公非少口呵呵幸得覿面不相逢相逢定要劈脊摟示湛水禪人禹門茆坡兩戰不勝便心憤憤束包萬里向劍刃上烽煙中橫鑽直闖不顧性命而來安龍欲與佛祖為冤氣壓諸方而去不知放下蒲團勝負之心一時冰消瓦解如靠銀山鐵壁到此信知安龍無法與人商量無禪與人計較既無法又無禪乃執筆云者箇漸他時異日切忌作佛法見作禪道見若作此見一棒打折驢腰莫言不道示乳源西堂從上古德擔當此任莫不從因地上打起精神所以六年苦行而明此一段大事斷臂立雪而了此一段正因負石踏碓而完此一段勝量汝既隨吾左右歷盡險岸幾經鞴爐卒風暴雨靡不相加待異日向孤峰絶頂處忽爾推出始知酬前萬倍幸甚示嵋霽禪人佛法兩字山僧固難啓齒亦難下筆何故山僧不知有佛不知有法更不知有衆生唯不知有佛法衆生所以據條白棒是佛也打是祖也打問也打不問也打管教一刀兩斷勿起第二念示聲遇禪人古德高流腰包荷笠千山萬水幾費勤勞向大爐鞴不顧性命千鍛萬鍊直要鎔成箇器所以年深月遠辛苦亦安終不畏難忽一日觸著磕著自是驚天徹地示達鑑黃居士達磨西來不立文字直指而已居士諄諄求老僧法語早已曲了也若得不曲直須回光反覆自看賞刑賞罰處也自看驅奴使婢時也自看村歌社飲時也自看喜怒哀樂時也自看解帶脫衣時也自看然後看得知覺全無生死雙泯菩提涅槃真如解脫了無所得於無所得處全體即心即佛如是見得徹把得定即火宅塵勞翻為清涼寶所刀山劍樹悉是玉蕊瓊枝其或不爾馬面牛頭依然猶在示達尊善人信為道源功德母信能遠離生死苦信能必到如來地爾既信佛開方便門以四事供養法華云我適曾供養今復還親覲然雖親覲但於生死路頭未曾曉了因而再四再三請老僧形於紙筆向第二門頭施箇把柄去且如何即是不是心不是佛不是物從者裏按定不被塵勞所撓不被諸緣所繫不被聲色所搖不被物欲所礙不被人我無明見聞覺知所轉一朝扭翻鼻孔佛也難近其傍祖也難親其右既有者箇威光即老僧説底亦如夢幻設或未然莫間間地示松石禪人世之稱禪和子當如松與石萬物凋謝他亦挺然四時互換他亦渾然山枯海竭他亦凝然天翻地覆他亦宛然據汝拜懇法語以為終身策勵又且不然何也汝於未生之際脫體現成才一念萌動便不如松如石也示朗輝禪人朗輝禪者請法語老僧無處啓口齒直將生死挂眉尖立箇金剛不壞體行問生從何所來坐究死向甚處去間忙動靜只如然待賓迎客不外此任他八面境風吹勿將此志移毫許榮華富貴心沒貪成佛作祖意休起秖以生死自究明世間法法無干己一明一切無不明切莫顛倒障諸己痛將者箇徹頭尾直教虛空爛到底行實師於甲午年春辭禹門一則禪德接住安龍湖山一日大衆入室作禮乞述行繇孤燈云人疑和尚為公為卿請示行實以決衆疑師云余生寒微家更無異迹乃蜀重慶江津毛氏子母姓陶因夢僧送桃令噉感而有娠於甲寅七月草日未時生乳名應僧寄名於寶山師從幼喜親雲水未幾聞金剛經遂著意理會自思身如夢幻生死臨頭誰作主宰故持金剛經年至十六壬申春侍母朝寶頂余乞僧指示僧云你年少且去念佛於是將經曉夕默持後感異夢不覺疑情頓發自謂遠離顛倒夢想此夢從何而有遂求決於僧僧云成佛成仙秖在心卻如沙裏去淘金塵垢淨時金自現免向他方外面尋余聞之疑情益甚胸中似有物礙不能自釋一日獲楞嚴解謂忘境不忘心終成虛妄余問之老衲衲云境可忘心不可忘忘心則成死物豫曰終非究竟又請益一老宿宿云你如何豫曰心忘境自寂宿然之示偈云莫執忘形與死心此箇難醫病最深直須兀坐探淵源始得見性識天真豫禮謝復閲楞嚴幾忘凍餒因患寒疾三返舉止唯艱誓願出家是夜果寧奈瘡瘧愈重白母剃髮於寄名師會下未久令過經弗合豫志遂往重慶謁破雪和尚雪云何處來豫曰本地雪云何處人豫亦曰本地乃咨念佛話雪云念佛也入地獄不念佛也入地獄豫曰不會雪云參去遂辭參歸源大師改參萬法歸一一歸何處三年心如木石行不知行坐不知坐至一切迎賓待客渾無異念總在一歸何處上著到忽一夜至四鼓時心境俱空豁然有省往昔礙膺之物一時粉碎若佛若祖自我流出始知婆婆原是小新婦遂呈偈倒跨崑崙走得來忽然又被火星催通身逼拶腥臊也惹得虛空沒下挨源曰猶是蝦跳不出斗豫震威一喝云請師速道源云蒲團圓似鏡豫拂袖便出一日辭源上別峰依破雪和尚雪云者裏刀耕火種住你不得豫曰更少某甲不得住後稍有未到處深加鉗鎚不意雪師示寂後依靈筏和尚甲申六月避秦侍筏過銅梁白水寺值夜半豫曰請安筏云著忙甚麼汝欲圖快活去豫曰不妨疑著一日命作中秋偈曰目擊天樞耀山川瑞色新一輪橫海上遍界盡光明筏然之丙戌菊月辭筏抵婺川參象崖和尚問猛虎不棲平川獰龍不宿兔穴未審以何為據象云氣沖霄漢豫曰恁麼則靈然獨露去也便出丁亥春侍象過彭水象云你昔在別峰做甚麼豫曰一事也無象云恁麼空度日了豫曰穿衣喫飯進酉司職後堂豫具威儀辭象云誰賓誰主豫一喝便出因上堂問威音者畔即不問威音那畔事如何象云庭前數株竹豫曰猶是者畔事象云門外幾莖松豫曰某甲則不然象云你又作麼生豫便喝象便打豫拂袖而退一日豫舉起坐具問恁麼則錦上添花不恁麼則戴角擎頭總不恁麼時如何象便打豫一喝象又打豫復喝象連打豫連喝而退又問平定干戈即不問衣甲卸下時如何象云天下太平豫曰太平後如何象云萬民樂業豫曰恁麼則野老謳歌去也戊子春命理叢林兩載甘苦備嘗一日值禮懺次象問為甚代魔王禮佛豫曰不敢負恩云魔王有何恩豫曰切莫瞞人遂命頌曰朝打三千暮打八百知恩報恩阿誰識得云未在更頌豫曰蒼天蒼天象休去己丑臘參本師迎於旅亭師云甚處來豫曰黃檗師云何人同來豫曰秖是某甲更與阿誰師云黃檗安麼豫曰和尚請茶遂侍師過禹門職維那兼理方丈上堂豫問爐鞴初開鉗鎚大展衲僧性命盡在和尚手裏師云汝喚甚麼作性豫便喝本師驀頭一棒豫曰恁麼則和尚性命亦在某甲手裏本師亦打豫拂袖而退一日觀水次本師把住云不許思索呈水車偈來豫即口答曰團圞一箇子平地波濤起濟人兼濟物不濟心不死庚寅年職西堂入室本師云臨濟兩堂首座相見齊下一喝那一喝是賓那一喝是主豫踊身而出八月命看牛山監收本師以源流拂子並信金至豫曰某敢妄荷此任耶即抽身出綏陽以啓呈上曰叢林有興廢佛法至凋零蓋為不得其人倘得人又何患佛法之不盛叢林之不整也且某原一懦夫未具大乘根器豈敢妄擔重任耶云云辛卯夏歸覲大冶兄云請源流一看豫曰不必冶云毒鼓已振三巴堅執作麼豫因而受之者便是從前參請之繇今日衆兄弟相索不得不出此醜
