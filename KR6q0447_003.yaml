body:
  text: 嗣法門人達最等編頌古世尊初生一手指天一手指地云天上天下唯吾獨尊脫體分明露出指天指地舉揚無佛各自稱尊惹得癡人打慞夜睹明星坐久成勞誤認明星源頭一濁到底不清世尊升座沒量漢兒上法臺大驚小怪惹人猜文殊椎下重拈出百萬人天盡活埋女子出定出得出不得太煞多饒舌文殊與罔明眼中重著楔臨濟三頓棒冤報冤兮讎報讎三番痛棒恨無休平空殃及兒孫也引得人人犯腳頭奪人不奪境一拶鋒鋩盡淨除地雷競發楚雲舒形山野色凌霄漢幽鳥銜花入帝都奪境不奪人空拳赤手立殊勳五嶽移來沒半分驅聖馳賢彈指許龜毛拈起覆乾坤人境兩俱奪肘後符行觸處通色前無物敢當鋒祖基佛業成煨燼大地山河絶影蹤人境俱不奪魔宮虎穴任優游狗膽羊肝燕酒樓驀逐淫坊花市裏太平句子詠無休臨濟四喝一喝金剛劍正施劈開風雨絶玄微銅頭鐵額俱截斷任是虛空也皺眉一喝金毛踞地時腥臊惡辣勢威威四方百獸潛蹤跡孰敢當頭正眼窺一喝探竿影草裏直教枯木徹頭尾千端萬緒始應知南極起雲北斗雨一喝不作一喝用群陰徹地連天凍草鞋𨁝跳上海門塞卻風雲雷雨洞廓然無聖廓然無聖驀然呈卷盡餘波意旨深熊耳山前成滯貨梁王殿上絶知音達磨面壁九年坐得骨頭疼將謂相瞞後代人若遇英靈親辨驗棒頭一頓不容情三關我手佛手不別撈三搭四弗歇時而捉出金彈打碎虛空骨節我腳驢腳齊走歷遍天涯海口縱橫不立聖凡兔角尖上現醜生緣人人日計六韜三略俱備破千裂萬成行上下四維捏聚麻三斤如何是佛麻三斤洞山老漢口皮薄若還撞著白拈賊連夜偷去搓成索無縫塔不同格子勢天然倒影長江射九泉任是巧工難畫繪風吹日炙到驢年庭前柏樹子庭前柏樹子擬議隔千里明眼衲僧無處尋鷓鴣啼在深花裏乾屎橛乾屎橛疑殺江南狐兔客夜半烏雞笑點頭鐵圍撞倒蘆花月本身盧舍那坐地看人忙應知我太懶眉毛剔起時渾身赤袒袒箇段風流刺人眼破沙盆叢林破沙盆盛粥並盛菜秪為掇不起豬嫌狗不愛須彌山動未動時空悄悄黑漫漫地向誰討秖緣不起箇念頭卻被須彌山遮了僧問雲門如何是一代時教門云對一說山高路險勿因循駟馬難追石火精對一說時墮塹矣瘖人說夢與誰聽僧問雲門不是目前機亦非目前事時如何門云倒一說一劍橫空伏尸萬里勦絶廉纖刮盡心髓倒一說生情委黑漆燈籠跳躍起口是禍門量大福亦大機深禍亦深弓梢懸壁上八面任風生萬法歸一萬法歸一一歸何漁翁灘上弄竿蓑忽有人來相借問移舟載月下煙波竹篦子絶點澄清略較些無端平地走龍蛇首山老子無情見撞著箇人打落牙布袋和尚六合相將一袋收絲毫不放過關頭朝朝出入無回互幾箇男兒覿面休子胡看狗突露聲兮復露牙驗人險處較些些縱是三頭六面客亦未輕輕放過他主人公灰頭土面箇狂夫潦倒不知白與烏地覆天翻唯自許那將蹤跡落江湖船子度夾山釣竿直下入深潭將謂金鱗食餌先撥轉疑團連點首洪波浩蕩鼓三千夾山示衆目前無法大用現前不存軌則目前無法兮萬象羅列山水悠悠兮遐邇應徹咦眉毛橫眼上莫認天邊月德山托鉢一箇郎當漢自倒還自起草鞋獰似虎不會末後句洞山寒暑枯木龍吟非偶然杜鵑啼血染枝煙落花每隨流水去寒暑何曾近得前二祖立雪六花片片逼人寒擬覓心安心不安冷地斷他一隻臂卻成當面把人瞞洞山云直道本來無一物亦未合得他衣鉢眼親手親蓋乾覆坤自顛自倒笑怪何人若約山僧拄杖見伊恁麼說打得如泥化作塵有僧下九十六轉語末後云設使將來他亦不受牙行經紀買賣有理百事合成寧分彼此若論將來他不受正是細姑嫌嫂嫂僧問趙州如何是趙州州云東門西門南門北門趙州東西南北門信口之談決有源隔壁有翁閒處斷醉扶竹杖聽高喧僧問雲門如何是透法身句門云北斗裏藏身雨灑空階樹結珠寒來天下共聲呼秋行春令雲門老笑殺雄雄大丈夫僧問五祖演一大藏教是箇切腳未審切甚麼字演云鉢羅娘奇哉義切鉢羅娘打開藏海墨花香任是英靈難啓口眉毛剔起萬丈長分燈雪基達師再三再四歷年深眉帶霜雲眼帶筋心佛是非俱了卻單根兔角活人心劍端達祖多年種下瓠和茄子實花靈意則嘉親拾一枚授與汝普天率土也周遮孤燈達智曹溪一脈涓滴不施今日分付彌隆八極祖鼻達最法法本無心無心亦無法付汝心法時無法無非法楚雲達普二三派列有來源遞代相承不偶然為汝流通正法眼拈香惟待虎龍年乳源達禪十年餘也共吾儕苦辣辛酸不寄懷我此付渠衣鉢去蛇穿馬腹始升階醉舌皈湛少室一宗今古傳代代相承續有緣吾今付與蛇頭去一任天涯倒弄拈善權達位久墮衣盂在大庚古今英傑豈能提吾儂拈出親分付龍馬牛羊莫共棲義廓達玄種因因亦實種果果能成因果不虛應三界汝唯尊極乘道真遍參幾不問春秋氣宇如吞萬斛舟付汝龜毛拂一柄碧雲深處按龍頭顯今達古大地拈來捏作泥丸成一粒不虛施只今付與闍黎也時至方堪救悟迷惟尊達自瞎驢邊滅已多時千載風聞不再疑我固拈來親授受燈燈續焰永無移書問復冢宰鄧檀越感荷德愛至矣林間人不意有肉身菩薩話會也但一向未悉吐露根源致令燈籠抱劫石之思露柱懷明月之念弗知何日再商復府內衆檀越巢棲穴息木食草衣乃道人分也更向利刃上翻騰猛焰中跳躑誠然瞎禿活計但非可語貧道承命架廬布以金帛為貧道計奈寡行鮮德未敢如命璧謝復李道臺過情言貧道有股毒氣從百草頭上殃驢禍馬貧道且驚且喜何也不意今日殃及居士又謂盡大地是一顆米大修行人從何處下口貧道劈脊便棒又謂從口入耶不從口入耶合取鉢盂耶貧道謂疑殺居士又謂肚皮七穿八穴未免叫償命貧道和聲便打云償甚麼命管見如斯試分析看復王月時文學來書云空庭冷淡不知居士家業已被貧道盡底劫在龜毛拂上若實趣道須將從前經過路頭并奇特知解一一剷卻剷到無可剷處剷得大地平沉虛空粉碎便是收因結果時也此復復果詹時文學扎謂閒忙動靜也秖恁麼大限到來無常逼迫也秖恁麼者此墮在無疑必死處好與三十棒須知恁麼中卻不恁麼不恁麼中卻又恁麼始有趣向分又云閲大慧禪師語録云要將生死二字貼在額頭上咄癡漢秖如四大分散後生死貼在甚麼處又云如負人重債被債主守定門戶逼取急無措辨相似咄汝於何劫負甚麼債來又喚那箇是汝債主速道速道又云但時憤然要明此事憤然且止此事畢竟從甚麼處明冒陳管見不知居士何以教我復羅平張教諭承教俗緣難割薄宦牽絆我道公錯又謂世出世法聽之於我一日遊山有悟我亦道公錯又謂仰冀法雨指迷途於幽谷我更道公錯錯錯且道者五箇錯字是殺人句耶活人句耶試檢點看直饒檢點得出依前漆桶不快上昭覺老人違座八載咫尺天涯遍界荊棘參天滿目狼煙攘地恭惟和尚起居萬福涕唾咸珠末運整頽綱陳年之枯骨謳吟遐方翻義海曠劫之頑石變化適辛丑夏飛無見頂像及慈旨到了唯哭類笑即笑同哭已而將錯就錯捏目膜禮欲刊草集恐玷先乘伺法賁錦官匍匐恭稟誠惶誠恐百拜上啓又一十四載瞻禮歎未曾有三五千曆侍右究竟全無了誠惶誠恐罪深河海恨智狹識淺百無一能適逢昭覺重新愧無陳獻更值花甲風殘景物蕭疏俾窮子報恩無地客秋不意鎮臺王檀越連次差官彊將剎竿扶起玄沙虎直得放行由是學步再結禍胎轍將微緣並草録呈上伏冀慈鑒百拜謹啓復醉舌上座目來書並佳稿信之曹溪一滴賴以不涸但恐世人飲之者死沾之者亡善須調治邇來宗匠門戶各開風化獨扇倘涉見聞慎勿鬥勝及至誘引處毋露圭角為佳復祖鼻上座音問氣宇軒昂迥超今昔可謂師子爪牙法門綱要既爾行可師法必重勿令毫髮許乖其勢便是萬古弘規人天眼目致癩狗泥豬得叨藥石公之裁制自是不群吾儕誤加丸散矣復江右葉居士如居士謂茫茫黑海未知何處是岸即此未知兩字正是捷徑恰好處須大著精采屏除見聞以致前後際斷打成一片亦無一片影子自然信步到家不用些子氣力此復復楚雲上座住持大柄得人為幸所謂獨木不成林孤掌不浪鳴也得來書與佳稿則知賢徒挺身弘道為釋迦老漢出氣幸甚大約任非小小非急遽可為而美成在久不待老僧口吧吧地特囑與達鑑居士老僧所棲院子結在無陰陽地上一任神通妙用持利刃帶鋒器底漢來無他插足處虛空消殞此院悠久天地崩頽此院堅固務要居士踏著受用無有了日如涉身於易成易毀之場辜負老僧開門以待復顯今上座子云巴掌拳頭血濺梵天且道泰時清汝何多事雖曰臨陳交鋒佛祖不讓當知時節到來其理自彰又謂未知老僧作何酬償待來不用一槍一旗管取勦絶命根只如勦絶命根作麼生道復義廓上座臨行時不暇門送言及末後句致令汝弗前進是老僧咎然而此事非圖僥幸苟安須善保重謹操履不與盲龜瞎驢同流共隊汝若肯甘淡泊不妨與老僧棲止一上勿使甜果美食換卻元初本體囑囑復晉公梅文學出手云已於火裏栽蓮似則似奈居士秖在有無內外中間尋討未能向空劫已前領荷所以除去意識分別知解則無有出身路寧不令貧道墮淚耶察察復廣南陸居士來書偏於頑鈍者昔世尊棄皇宮入雪嶺為學頑鈍龐老團圞頭學無為亦體此頑鈍更冀公向未有虛空世界之先看頑自何來鈍從何起佛法世法者都盧打成一片連者一片化之無跡運之無方則頑鈍之用自是靈妙莫測矣復子公居士手諭令人煩惱頓消不知此身之在火宅者善固善矣弗知公以煩惱認為何物火宅復作何狀若端的到前後際斷處忽然噴地一發方到懸巖撒手不必移想時矣復司馬吳檀越雲巢兀坐有眼如盲手札飛來致令露柱展眉懸慕之心始釋謂謝絶虛榮皆賴山野金針一撥是則是虛空墮地時公向甚處著腳又云得以優游山水嘯傲時俗者俾古廟香爐並皆震動擬涉沉思縱潛形於空無邊天亦屬偏見請反覆自看看者看底落在甚處若會得落處天之上地之下淨盡無餘不著問人自知之也復宿石張居士古人夏不排窗冬不圍火又云毫釐繫念三塗業因瞥爾情生萬劫羈鎖不識公腳跟點地也未若得腳跟點地敢許酒肆淫坊魔宮虎穴豎去橫來可與大年無盡把手共行我問你盡大地是箇火坑作麼生跳出盡大地是箇無常作麼生避得盡大地是箇鐵丸作麼生吞吐盡大地無一微塵許向甚處安身立命速道復黎平司李馮檀越手捧大作何幸如之恨貧道不善接人是聖是凡到來一味痛棒熱喝教伊進無門退無路管取第二念不生但士大夫學道從外打入則富貴故能包天地挾十虛我輩自內打出卻貧寒因而毫髮難容纖塵不立秖知有向上一竅復鎮臺王檀越老僧住院以來食指作生涯空身為道業此身既空生涯悉是假名道業盡成夢語閒坐之餘陡瞻示諭珠光撲地俾拂子感嘆莫及也第云禪風教遠木鐸聲弘欲沾毒氣者病僧駭然無地何故佛真法身猶若虛空應物現形如水中月不知喚甚麼作毒氣者箇境界總不出老檀越掌握中以是而知盡十方世界靡不收攝盡十方世界尚無第二箇姓王底敢請檀越直下信取況令威黔粵德被邊疆士庶莫不銜恩草木咸沾至化俟緣會時方敢拈杖觸碎鼻孔莫言不道讚釋迦佛像稽首天人師四十九年說變化百千厚著面皮雀巢頂上非智蛛網眉間若愚何為三界獨尊煞是娑婆賊子饒你坐致劫空時依舊蘇嚕蘇嚕悉唎悉唎出山像螺髮髼鬆坐若樁蒲團許汝妄承當看來覿體無生活更纍山僧為舉揚苦行佛像鐵石心行鐵石事形如枯樁瘦而莫既山僧讚之不及罵之非義直饒坐致平沉時未免拄杖道不是觀音大士紫竹林中常兀兀弘慈應物遂人心千江月印清如許觸處逢渠觀好音普賢大士是相非相非相是相既住峨嵋頂為甚入此嶂若不念先願力深請下火爐來算帳達磨大師三四七之末二三之首不會韜光晦跡一味揚家敗醜踏折一花五葉蘆後代兒孫多犯手又者箇精怪桑門大害點污多少英豪鼓惑無窮蒙昧不契梁天子故墮嵩山債償不足兮劈不開到此兒孫猶弗快又不契梁王折蘆江上直饒露盡骨髓總是無風起浪本師老人讚者老木𣔻似俗非俗胸藏萬有手拈棒拂顯佛祖威入異類數半肩伽黎一頭驢骨憶昔冤沉如海深鋒穎盡淨咸搦出自讚據條白棒不容祖佛硬如鐵橛軟似羅縠全無為人心第二月匪續請去供養他恐人不心服楚雲普請佛頭坐斷玉海飛煙有人問著腳踢粗拳挺然巍巍悄地懸懸不留蹤跡向人間臉厚不值錢縱然描得十分全難與鼻公一見祖鼻最請者箇古怪眼空四海不肯諸方龍象捉敗孤迥迥惡辣辣任是丹青畫不成料得乳公無以奈乳源禪請世法不通佛法不會有大我慢無大慚愧慣以毒藥殺人不用平和之劑結盡死冤家全不識進退者樣無明頭不立佛祖位劍端祖請描也不著畫也不上換人眼睛豎拂拈棒膽大心粗恁意放曠雪基師請者漢敗闕懸巖撒手惡辣鉗鎚無情掃帚英氣逼人佛祖不有讚之即謗筆之甚醜公若請去供養智者見之必嘔咦秖可拋向火聚中看他悠久不悠久善權位請括地包天而無聖凡春則花笑雷鳴夏則萬卉含煙秋則金風體露冬則遍界凝寒者裏識得他面孔毛頭吞卻大千而又何必曰真何以云讚令天下後世人返失自家觀惟尊自請鬚短髮長非和尚像不通梵語華言單拈一條鐵棒攝盡野狐形蹤不留佛祖榜樣者箇惡辣東西為甚請他供養天水維那請至道無形至理無言直饒僧繇寫到十全打伊血濺梵天借令大悲手眼教他無地鑽研求之不獲其益讚之亦乃徒然無如彼此自適四大壞時不致墮落坑塹咄和持法孫請老漢無點痕跡作麼描得著他有時天上人間為人直切若以眼見則瞎復以心擬成魔秖是者箇古錐佛祖亦無奈何伊今切忌多親近惟恐帶入野雲窩出蘊上人請者箇老賊全不相樣問到祖意西來一味盲枷瞎棒公若供養他恐外人生謗若生謗不枉靈山會裏同酬唱達鑑居士請曠劫無姓名色相夫何有毫不動鋒鋩虛空顛倒走如許大底無明佛祖爭敢開口稱為人天師誠然是禍藪若或禮拜燒香葛藤絆汝心首巖壁禪人請
