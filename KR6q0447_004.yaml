body:
  text: 嗣法門人達最等編偈辭本師老人違師已涉程抱恨驢年深惟有巴歌曲幾回詠更新冬日別禹門衆友幾年聚首共爐頭草履情生逐野丘謾道熱腸分袂去朔風更待語無休即事呈禹門將三就四匪良圖把柄鋤兒秖自居直待三三逢九五又從頭起立規模寄友思君無計把詩題一句分明道破伊相識不知何處去春將柳絮送風吹送大冶法兄憶昔渝城把臂時寒挑松火兩無疑快君先得乘雲興笑倒拈花那老兒復太僕寺蕭公一物原無有甚門烏容聖位與凡存不緣真境安生妄豈陟神機便費論梅嶺風生清意氣義湖月曉破衢昏當軒有路通車馬何必馳心喫棒痕壽華亭侯王公颯颯西風雨共齊山鳴谷韻慶無疑游人也效呈三祝為報君家㘞地時答太僕寺蕭公惠手爐紅爐邊事喜君裁直下分明不用猜一涉馳思千萬里不知何日把心灰示君正周居士挈杖當風卓白雲銀河斗柄兩相分頭頭已露鋒鋩事莫謂吾儕不示君示塗毒羅居士鉢盂口開情難盡一曲離歌事已休此去讀書亭上望應知湘水吼雲樓留別慧覺之石林庵灘頭吼發奮天機任是那吒倒卻威縱有石林潛影相也須竿上再投磯與江城山最乘靜主江城山畔結廬居月到窗前水到廚活火松煙烹白石芟茅唯問劫雲初別友把臂松窗下何緣話別離菊花含笑遠錦浪載歌遲竹杖肩風月芒鞋傍野溪明明逼直路莫謂有多岐號石蓮禪人石中何事迸青蓮日炙風吹氣更妍不假陽春分外別馨香特地逼人天送一則禪人年去年來竭力深腳頭多被草鞋侵汝今好向碧雲裏三尺鋤兒掘老岑號祖鼻上座直指心地法如鐵橛牆壁若問阿誰維應當在祖鼻號醉舌上座半字及滿字橫說與豎說到不思議處獨汝箇醉舌號楚雲上座楚雲彌布蓋虛空日月山川沒路通截得西湖水逆上叢林自此喪宗風示別癡書記年老心疲憶靜居披風啄雪傍山依文章錦繡如銷盡來喫吾儕白棒歸即事示衆無位真人不會眠牛皮經卷久翻穿倒顛一字緣無見撒向虛空絶正偏示楚雲西堂耳若瞽兮眼若聾舌頭切忌鬥機鋒時臨自有殊光照水滿天湖月滿空即事別宜陽光明殿裏不肯住卻將荊棘認珠林待我三生六十劫漫來此地打葛藤送雪基上座代省劍峽全無一線罅一聲彈指破牢關風塵不滯眉尖上信步雲山去復還送祖鼻首座之鳳翥傑出叢林奪祖機兩眉橫挂劍鋒依而今布露天涯外萬古英英意有餘施主請升座師作困勢口占連請茆居豈等閒儂家落落困高山可憐無限癡男女更要重加鐵柱關寄懶生法弟揖別鎖江橋乘雲步九霄無心追舊友有志豎新標石虎風鞭逐泥牛雨索撩鮮分緇與素因爾寄同僚送楚雲首座之雙溪苦口叮嚀莫怠荒祖家事業不尋常教渠壁立巖頭上一任諸方道短長送祖鼻首座歸玉泉玉泉歸去莫辭勞歷祖勛猷全節操老漢幾經曾退位千鈞重任在公挑寄一乘老宿文上莫加點與世渾一箇擬心落二三隨境成漂墮咄門外白雲峰一座送楚雲首座歸圓通弘道及扶宗預須與物融驀然伸出手自西又自東示廣南陸居士罷釣枕孤峰此心並雪同形枯翻鐵面意淡破泥蹤日月真知己山川與性融何當施大惠一衆祝無窮復金騰張道臺袖裏金鎚信手呈全生全殺沒人情若然居士能親薦管取煙波瞬息平復如潢居士茆舍蕭疏裹白雲七零八落且容身直饒英俊難分曉未透關頭漫問津贈壯猷黃居士中心底樹子挺然恆秀麗不被惡風吹息息清人意示三畏黃居士野雲七八片微雨兩三聲驚醒地頭者勿勞更問津贈瑞雲劉居士偶來無異說攜手暮山遊踏斷溪礄石虛空笑點頭示天水禪人理會箇不知如吞鐵蒺藜忽然咬得破便識未生時示成仙彭梓匠花攢錦簇鋒利箇未兆之先刊得麼字字若從刀下識老僧笑汝太穿鑿復大一居士隔岸遙看老𠎦牛追風捕雨不回頭而今鐵網籠霄漢四海獰龍一並收魚龍道中喫撲口占偶喫一交似劈柴了無餘物挂襟懷秖緣未結陳公案依舊同兄弟飲齊因天水牧牛頌不恰遂示之鐵牛無腳去來同日夕優游絶後蹤倏爾翻身奔藕孔大千無物不包容寄再三禪人挂月樓頭接笑談並無消息與君探君今欲話從前事愧我羈留意再三寄溪聲法兄不問山兮不問廛全收全放孰能攔情來記我霜花事興去酬他粥飯錢麈尾揮時煙浪靜杖頭卓處海天寬堂堂歷歷皆家計一擊銅頭鐵額穿病中偶占老病年深恨未休阿伽陀藥最難投翻身不覺金山碎唯有藤條不夜秋月印山孤輪懸漢外斜影落山中異照生晴夜千江興不同浴池頓開一大口吞佛併吞祖若箇衲僧來一時俱活煮點燈山造物生成不假工明燈灼灼映長空光聯劫外誰分析一段清奇自不同丈菊箇段英奇別量天度地長秋行春令也歷歷操風霜遠鐘破曉何方寺鐘聲到上林雲山遮不住數數出高岑避暑茅居深處古林東冷眼何分異與同泉石豁開情淡淡荷花拈起意濃濃寒崖密樹重陰靜碧澗洄瀾萬派通擬欲直趨雲漢上葛衣高挂嶺頭松宿高明寺有感散步臨斯剎僧殘寺亦零晨昏鐘鼓寂上下燭燈沉亂草為趺座粗拳當枕橫深嗟成假寐一覺到天明雪中次韻江山一色塗野澗絶聲呼分外玲瓏遠於中皎潔孤銀山飛白練玉樹挂真珠不為寒催逼焉能徹底舒除夕兀坐松窗事事疏更深無偈與人書爆聲震裂驚天地不覺今宵夕已除鉏草根頭勦絶始心灰野興從茲盡放開翻轉地皮和月摟了然伸手不他猜次從軍行韻土面灰頭共打眠日隨秣馬疾如煙杖藜卓處旌旗動鼓樂鳴時鉢袋懸枕畔亂雲堆白骨匙邊熟氣雜餘羶堯天舜日何時晤但拂龜毛續正傳七星峰何來幾點勢如星獨耀長空今古明澗底影含山色麗聳然滴翠布雲深同司馬梁公石頭山晚眺突出群峰箇怪山殘霞疊疊挂腰間幾回悵望歸鴉盡掉杖還敲最上關化戒衣鷲嶺傳來直至今東拋西擲有誰欽斯時舉似檀那也出手相添一線因早梅稜稜氣宇奪芳妍老幹從茲賣弄先秖為一番寒徹骨故今嘯傲自天然即事示衆底事分明絶正邪秖緣認影有殊差人人向此須珍重莫把驪珠去溷沙秋晚宿玉泉夜靜晴天爽圓音醉玉樓不聞魚弄藻那問月移舟百八鐘聲切三千鼓拍悠慵慵枕石上獨據在源頭汀聲萬里潮音到耳邊魚龍深解句中玄聲聲傳遍三千界秖教游人向此穿師子峰踞地盤空勢太奇雄雄猛獸莫能依騎聲蓋色高岡上不異當機震吼時水車機關卓定去還來聲震乾坤疾似雷摶捖長河頻蕩漾凌空孑孑任君裁挂月樓危樓高插青霄外玉鏡移來挂壁前四顧雲山堆晚翠適然乘興把詩傳石筍生成自不牽枝葉達者烏能較短長節操已經霜月老許誰伸手得拈嘗寄趙鎮臺夜話其中有別傳也曾直截為君拈而今未審如何委委得忙忙好著鞭示悟心行者三喚侍僧忠國老婆心一片就中煎蘭溪不欲重分析鐵鑄心肝教悟穿別靜隱多年滯寂在蘭溪究竟無功適自迷不意雲騰飄赤足芒鞋今夜挂松西住丹霞有感衆山之聚結丹霞穎脫虛空上靡差雷掃電揮時熠熠風呼雨應日吧吧杖開金闕乾坤靜麈拂玄關日月奢劫外春光恆熾盛何須據坐寶蓮花雪中示衆分雲闢霧上丹霞暢我詩脾意況嘉天雨寶花分半偈地聯玉樹轉三車狂猿有興迷津渡俊鷂無因過野家裕後光前龍象客應知展處足生涯送顯今上座踏翻波底月來親眼眼相看不隔塵更出老僧一隻手石頭拈起總家珍復達權陶居士次來韻法無異相靡西東倒著剎竿四海融萬象森羅齊撫掌阿誰不解展家風示中玄禪人蘭溪杳不涉蹊徑終日眠雲枕萬峰弗意闍黎輕著腳烏藤痛責又奚容示任庸趙居士無念始名真究竟情存取捨卻乖真公能當下將心息何必乘舟去問津示九有錢文學若云有見非真見覷破無心底事親方寸悄然機不墮揚眉瞬目悉家珍示達綱居士老漢未曾有半字孜孜何用索文章教伊拽轉繩頭去永劫靈苗始不荒示達佛居士不犯人苗自穩密機鋒稍涉太無端狂心放下青山老六月炎天徹骨寒復司李馮檀越步來韻萬億須彌眼孔中寒溫不涉傲東風荊山有玉誠非璧上國無人信始通兔角杖能穿海嶽龜毛繩慣束虛空謝君枉顧殷勤甚愧我長眠不影松復馮夫人箇事從來沒段形悟來何處有乾坤縱橫踏破壺中月遍界無非淨妙身壽海岸居士一二三四五六七七六五四三二一數到驢年卒未休箇中消息許誰識山居癡心山裏學愚蒙百法無能作主翁饑啜松花嫌地窄寒烹霜葉恨天空衲殘有興修雲補屋陋無心運石封一等閒情分不到生緣竟日笑兒童徘徊無意逐山巔半掩松門待客還壁漏斜陽穿竹榻窗虛薄霧浸詩篇簷前鳥語傳空谷嶂外猿聲入靜簾名利不干清且樂長年嘯傲白雲邊石泉香漬到寒廬鐺裏頻添花雨餘滿灶雪柴烹紫芋一肩霜葉煉清虛野雲榻上堆仙畫明月窗前讀梵書自慶不通今古事煙霞深處秖耘鋤茆屋萬山中淡雲恆作伴勘賢秖一錐陶聖經千鍛徑僻莓苔滑溪深水月煥嶺南挂緑蘿一任虛空爛居山深邃隔煙蘿乘興疏狂樂更多眼底晴嵐風月靜乾坤分付與頭陀不徇名利不趨廛淡飯粗衣樂更閒若問山中親切句沙鐺幾度發蒼煙法派徹達大聖心堅弘至妙理發明圓頓教萬古成規矩起信歌原夫實性隱於形名位乎天地貫乎古今育萬物生生之妙行四時互換之令與麼起信勿謬正因非人人非自自無相國中恆密示體此心焉曰佛了此心焉非物坐殺活場而坦蕩自若登般若岸而苦哉佛陀歷生死禍福之源啓迷悟淺深之波齊空有等高下爍破大千明暗甲拈卻時人眼底花無背向沒正偏玲瓏恰似玻璃盞獨脫難教渠一見亡彼我定治亂隱顯煥然無縫罅淨穢明明不擇伴類魔黨而百醜鈞陶蹈祖庭而十方齊震究理事以全該統千差於一器堪嗟初祖航海來兩桂芬芳成禍胎或曰即佛即心何異鼠咬鐵釘更云直指見性奚啻背面捉影屋裏老爺好快樂休對癡人呈家活指南掉北有來由極談概不落沉浮鳥啼花發玄中玄雨雪交加復誰瞻夜半怒雷聲海外木人石女化機解未萌已前逞神通逗到空空空不空莫挂一縷及一絲識取根源豈外事無陰陽地盡掀翻師子窟中沒野干休休休處更休休打起精神直到頭於中略有些微念無量影子一時現現此影子有何功但恐落在坑塹中轉得頭來有甚面辛苦萬端方矢願願有願無始終誤可憐回互不回互出入須知不自瞞自瞞尤失信之端從來箇事勿移易要顯如來第一義削乖心除障弊聖凡一體夫何忌中外打徹最全備地獄天堂任游戲人讚仰鬼神懼佛祖龍天密符契不可思議功德而護衛
